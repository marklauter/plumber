name: .NET Tests

on:
  push:
    branches: [ "main" ]
    paths: [ "Plumber/**", "Plumber.Testing/**", "Plumber.Tests/**", "Sample.Cli/**", "Sample.Cli.Tests/**", "Directory.Build.props", "Directory.Build.targets", "Directory.Packages.props" ]
  pull_request:
    branches: [ "main" ]
    paths: [ "Plumber/**", "Plumber.Testing/**", "Plumber.Tests/**", "Sample.Cli/**", "Sample.Cli.Tests/**", "Directory.Build.props", "Directory.Build.targets", "Directory.Packages.props" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Verify formatting
      run: dotnet format "Plumber.sln" --severity info --verify-no-changes

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        configuration: [ Debug, Release ]
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build -c ${{ matrix.configuration }} --no-restore

    - name: Test
      run: dotnet test -c ${{ matrix.configuration }} --no-build

    - name: Upload coverage report
      if: always() && matrix.configuration == 'Debug'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-cobertura
        path: |
          Plumber.Tests/coverage.cobertura.xml
          Sample.Cli.Tests/coverage.cobertura.xml
        if-no-files-found: error
